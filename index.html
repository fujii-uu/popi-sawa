<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link rel="stylesheet" href="css/style.css?v=6">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600&display=swap" rel="stylesheet">
</head>

<body>

<header class="site-header">
  <nav class="nav">
    <a href="index.html">Movie</a>
    <a href="credit.html">Credit</a>
  </nav>
</header>

<div class="gallery">

  <!-- 1 -->
  <a href="#" class="item center-text" data-video="ug21vj0X4Yg">
    <img src="img/nakaguro.jpg" alt="1">
    <div class="text"></div>
  </a>

  <!-- 2 -->
  <a href="#" class="item center-text" data-video="9zur8o8xtrY">
    <img src="img/hane.jpg" alt="2">
    <div class="text"></div>
  </a>

  <!-- 3 -->
  <a href="#" class="item" data-video="yhP8NSv1mOk">
    <img src="img/haru.png" alt="3">
    <div class="text"></div>
  </a>

  <!-- 4 -->
  <a href="#" class="item" data-video="17OrL44WgpE">
    <img src="img/12gatsu.jpg" alt="4">
    <div class="text"></div>
  </a>

</div>

<!-- モーダル -->
<div id="modal" class="modal">
  <span class="close">&times;</span>
  <div class="modal-content">
    <iframe id="youtube-player"
      src=""
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>
</div>

<!-- JS -->
<script>
const items = document.querySelectorAll('.item');
const modal = document.getElementById('modal');
const player = document.getElementById('youtube-player');
const close = document.querySelector('.close');

items.forEach(item => {
  item.addEventListener('click', e => {
    e.preventDefault();
    const videoId = item.dataset.video;
    player.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
    modal.style.display = "flex";
  });
});

close.addEventListener('click', () => {
  modal.style.display = "none";
  player.src = "";
});

/* 背景クリックでも閉じる */
modal.addEventListener('click', (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
    player.src = "";
  }
});
</script>

</body>
</html>
